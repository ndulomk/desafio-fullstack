services:
  postgres:
    image: postgres:17-alpine
    container_name: mamboo_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-edgar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-mamboo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-edgar}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mamboo_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mamboo_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-edgar}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-mamboo}
      DB_SSL: 'false'
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mamboo_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mamboo_frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mamboo_network

volumes:
  postgres_data:

networks:
  mamboo_network:
    driver: bridge
